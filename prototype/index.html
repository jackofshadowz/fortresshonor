const PRESTIGE_CAT = [
  { id:'p_statue',   name:'Bronze Statue',   desc:'A likeness in the square',  cost:120,  honor:50 },
  { id:'p_fountain', name:'Marble Fountain', desc:'The courtyard glitters',    cost:280,  honor:120 },
  { id:'p_garden',   name:'Royal Gardens',   desc:'Envy of every realm',       cost:600,  honor:280 },
  { id:'p_cathedral',name:'Grand Cathedral', desc:'Spires touch the clouds',   cost:1200, honor:600 },
  { id:'p_throne',   name:'Golden Throne',   desc:'Fit for a true sovereign',  cost:2500, honor:1400 },
];
const CATALOG_BY_ID = {};
for (const k in SKIN_CAT) for (const it of SKIN_CAT[k]) CATALOG_BY_ID[it.id] = Object.assign({ slot:k }, it);
for (const m of MOD_CAT) CATALOG_BY_ID[m.id] = Object.assign({ slot:'mod' }, m);
for (const p of PRESTIGE_CAT) CATALOG_BY_ID[p.id] = Object.assign({ slot:'prestige' }, p);

// Honor ranks — your title scales with prestige
const RANKS = [[0,'Peasant'],[50,'Squire'],[150,'Knight'],[350,'Baron'],[700,'Earl'],[1300,'Duke'],[2600,'Sovereign']];
function honorRank(){ let r='Peasant'; for (const t of RANKS) if (META.s.honor >= t[0]) r = t[1]; return r; }

const BADGES = [
  { id:'first_blood', name:'First Blood',  desc:'Defeat a foe',        honor:10,  test:s=>s.stats.kills>=1 },
  { id:'centurion',   name:'Centurion',    desc:'100 foes felled',     honor:25,  test:s=>s.stats.kills>=100 },
  { id:'slayer',      name:'Slayer',       desc:'500 foes felled',     honor:60,  test:s=>s.stats.kills>=500 },
  { id:'giantslayer', name:'Giant-Slayer', desc:'Fell a boss',         honor:30,  test:s=>s.stats.bossKills>=1 },
  { id:'veteran',     name:'Veteran',      desc:'Reach wave 5',        honor:25,  test:s=>s.bestWave>=5 },
  { id:'warlord',     name:'Warlord',      desc:'Reach wave 10',       honor:50,  test:s=>s.bestWave>=10 },
  { id:'legend',      name:'Legend',       desc:'Reach wave 15',       honor:100, test:s=>s.bestWave>=15 },
  { id:'flawless',    name:'Flawless',     desc:'Clear at full wall',  honor:30,  test:s=>s.stats.fullClears>=1 },
  { id:'collector',   name:'Collector',    desc:'Own 6 cosmetics',     honor:40,  test:s=>s.owned.filter(id=>{ const c=CATALOG_BY_ID[id]; return c && c.slot!=='prestige'; }).length>=6 },
  { id:'tycoon',      name:'Tycoon',       desc:'Earn 1000 Gems',      honor:50,  test:s=>s.stats.gemsEarned>=1000 },
];

/* ---------- equipped-loadout accessors (used by the render layer) ---------- */
function metaEquip(slot){ return CATALOG_BY_ID[META.s.equip[slot]]; }
function heroSprite(){ const h = metaEquip('hero'); return (h && h.sprite) || 'warrior_b'; }
function bannerColor(){ const b = metaEquip('banner'); return b ? { color:b.color, ink:b.ink } : { color:'#ff5e6e', ink:'#9c2433' }; }
function rerollCost(){ return META.s.mods.quarter ? 10 : CONFIG.economy.rerollCost; }
function metaDmgMult(){ return META.s.mods.fletcher ? 1.12 : 1; }
function metaTerrainWash(){ const t = metaEquip('terrain'); if (t && t.wash){ ctx.fillStyle = t.wash; ctx.fillRect(0,0,W,H); } }

/* ---------- run economy & badges ---------- */
let runKills = 0;
let lastEarn = { honor:0, gems:0 };
function metaOnKill(e){
  runKills++; META.s.stats.kills++;
  if (e.kind === 'boss') META.s.stats.bossKills++;
}
function metaOnWaveCleared(flawless){
  if (flawless) META.s.stats.fullClears++;
  if (wave-1 > META.s.bestWave) META.s.bestWave = wave-1;
  checkBadges(); META.save();
}
function metaOnGameOver(){
  const earned = Math.max(0, (wave-1)*10 + runKills);   // Gems are the spendable reward
  META.s.gems += earned; META.s.stats.gemsEarned += earned;
  META.s.stats.runs++;
  if (wave-1 > META.s.bestWave) META.s.bestWave = wave-1;
  const beforeHonor = META.s.honor;
  checkBadges();
  lastEarn = { gems: earned, honor: META.s.honor - beforeHonor };
  META.save();
}
function checkBadges(){
  let newly = [];
  for (const b of BADGES){
    if (!META.s.badges[b.id] && b.test(META.s)){
      META.s.badges[b.id] = true; META.s.honor += b.honor; newly.push(b);  // badges raise your rank
    }
  }
  if (newly.length){
    banner('BADGE EARNED!', '#ffd95e');
    floaters.push({ x:W/2, y:300, text:newly[0].name+'  +'+newly[0].honor+' Honor', t:0, dur:1.6, size:18, color:'#ffd95e' });
    sfx.fanfare();
  }
  return newly;
}
function hasNewBadge(){ return BADGES.some(b => META.s.badges[b.id] && !META.s.seenBadges[b.id]); }

/* ---------- store transactions ---------- */
let menuToast = null;
function toast(t){ menuToast = { text:t, until: time + 1.4 }; }
function spendGems(cost){ if (META.s.gems < cost) return false; META.s.gems -= cost; return true; }
function buyItem(it){
  if (it.slot === 'mod'){
    if (META.s.mods[it.id]) return;
    if (spendGems(it.cost)){ META.s.mods[it.id] = true; META.save(); toast(it.name+' unlocked!'); sfx.merge(); checkBadges(); }
    else { toast('Not enough gems'); sfx.thud(); }
    return;
  }
  if (it.slot === 'prestige'){
    if (META.s.owned.includes(it.id)) return;
    if (spendGems(it.cost)){ META.s.owned.push(it.id); META.s.honor += it.honor; META.save(); toast('+'+it.honor+' Honor — '+honorRank()+'!'); sfx.fanfare(); checkBadges(); }
    else { toast('Not enough gems'); sfx.thud(); }
    return;
  }
  if (it.cost === 0 || META.s.owned.includes(it.id)){
    META.s.equip[it.slot] = it.id; META.save(); sfx.place(); return;
  }
  if (spendGems(it.cost)){
    META.s.owned.push(it.id); META.s.equip[it.slot] = it.id; META.save();
    toast(it.name+' equipped!'); sfx.merge(); checkBadges();
  } else { toast('Not enough gems'); sfx.thud(); }
}

/* ============================================================
   META UI — wallet, store, badges (immediate-mode, like the HUD)
   ============================================================ */
let uiHits = [], storeTab = 'cos';
function hit(x,y,w,h,fn){ uiHits.push({ x,y,w,h,fn }); }
function handleMenuTap(p){ for (const h of uiHits){ if (inRect(p,h)){ h.fn(); return true; } } return false; }
function honorIcon(x,y,r){ star(x,y,r,'#ffd95e','#a8761c'); glint(x-r*0.3,y-r*0.3,r*0.22); }
function gemIcon(x,y,r){
  opoly([[x,y-r],[x+r*0.85,y-r*0.25],[x,y+r],[x-r*0.85,y-r*0.25]], '#7fe0ff', '#2a8fc0', 2);
  opoly([[x,y-r],[x+r*0.85,y-r*0.25],[x,y]], 'rgba(255,255,255,0.55)', null);
}
function drawWallet(x, y){
  // Gems — the spendable currency (left, primary)
  pillBg(x, y, 86, 30); gemIcon(x+17, y+15, 9);
  chunkyText(META.s.gems, x+31, y+16, 14, '#9fe8ff', null, '600', 'left');
  // Honor — prestige rank (right)
  pillBg(x+94, y, 96, 30); honorIcon(x+110, y+15, 9);
  chunkyText(META.s.honor, x+124, y+16, 14, '#ffd95e', null, '600', 'left');
}
function menuBg(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3a4d8a'); g.addColorStop(0.5,'#5a6fae'); g.addColorStop(1,'#7a8fc8');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  for (let i=0;i<20;i++){
    const x=(i*167.3)%W, y=(i*97.7)%H;
    ctx.globalAlpha=(0.15+0.5*Math.abs(Math.sin(time*1.2+i)))*0.4;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,(i%3)*0.4+1,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function menuHeader(title){
  chunkyText(title, W/2, 36, 28, '#ffd95e', '#5a3a0a');
  drawWallet(W/2-95, 58);
  chunkyBtn(12, 50, 88, 36, '#52b3f0', '#2f7fb5', '#1d5a8a', '‹ BACK', 16);
  hit(12, 50, 88, 36, ()=>{ mode='title'; });
}
function drawMenuToast(){
  if (menuToast && time < menuToast.until){
    orr(W/2-120, 700, 240, 38, 13, 'rgba(43,40,70,0.92)', '#ffd95e', 2.5);
    chunkyText(menuToast.text, W/2, 719, 14, '#fff', null, '600');
  }
}
function chipPreview(it, cx, cy){
  if (it.slot === 'hero'){ spr(it.sprite||'warrior_b', 192,192, Math.floor(time*6)%6, 0, cx, cy+12, 0.15, false, 0.76); }
  else if (it.slot === 'tower'){ img('tower_'+(it.suffix||'b'), cx, cy+14, 0.15); if (it.glow) star(cx, cy-12, 5, '#ffe08a', '#a8761c'); }
  else if (it.slot === 'banner'){ flag(cx, cy+13, 16, it.color, it.ink); }
  else { orr(cx-15,cy-7,30,22,5,'#8bd05e','#5fa83c',2); if (it.wash){ ctx.fillStyle=it.wash; rr(cx-15,cy-7,30,22,5); ctx.fill(); } }
}
function drawChip(it, x, y, w, h){
  const owned = it.cost===0 || META.s.owned.includes(it.id);
  const equipped = META.s.equip[it.slot] === it.id;
  orr(x, y, w, h, 10, 'rgba(255,255,255,0.14)', equipped?'#ffd95e':(owned?'#7ed05f':'#cfd6e2'), equipped?3.5:2.5);
  chipPreview(it, x+w/2, y+20);
  chunkyText(it.name, x+w/2, y+h-20, 9.5, '#fff', null, '600');
  if (equipped) chunkyText('EQUIPPED', x+w/2, y+h-8, 8, '#ffd95e', null, '600');
  else if (owned) chunkyText('TAP TO USE', x+w/2, y+h-8, 8, '#7ed05f', null, '600');
  else {
    gemIcon(x+w/2-13, y+h-8, 5);
    chunkyText(it.cost, x+w/2+1, y+h-8, 9, '#9fe8ff', null, '600', 'left');
  }
  hit(x, y, w, h, ()=>buyItem(it));
}
function drawStoreRow(it, yy, owned, ownLabel){
  const afford = META.s.gems >= it.cost;
  orr(12, yy, W-24, 56, 12, 'rgba(255,255,255,0.12)', owned?'#7ed05f':'rgba(255,255,255,0.3)', owned?3:2);
  chunkyText(it.name, 26, yy+20, 15, '#fff', null, '600', 'left');
  chunkyText(it.desc, 26, yy+39, 11, '#dfe6ff', null, '500', 'left');
  if (it.honor) chunkyText('+'+it.honor+' Honor', W-150, yy+39, 10, '#ffd95e', null, '600', 'left');
  if (owned) chunkyText(ownLabel, W-58, yy+30, 14, '#7ed05f', null, '600');
  else {
    chunkyBtn(W-120, yy+12, 100, 32, afford?'#ffce5a':'#b0ada6', afford?'#dba32c':'#8d8a83', afford?'#9c6f12':'#6e6b64', 'BUY '+it.cost, 14);
    hit(W-120, yy+12, 100, 32, ()=>buyItem(it));
  }
}
function drawStore(){
  uiHits = []; menuBg(); menuHeader('ROYAL STORE');
  // tabs
  const tabW = 148;
  [['cos','COSMETICS',12],['mod','UPGRADES',166],['pre','PRESTIGE',320]].forEach(([id,label,tx])=>{
    const on = storeTab===id;
    orr(tx, 100, tabW, 34, 10, on?'#ffd95e':'rgba(43,40,70,0.7)', on?'#a8761c':'rgba(255,255,255,0.3)', 2.5);
    chunkyText(label, tx+tabW/2, 118, 13, on?'#5a3a0a':'#fff', null, '600');
    hit(tx, 100, tabW, 34, ()=>{ storeTab=id; });
  });
  if (storeTab === 'cos'){
    let yy = 150;
    [['hero','Hero'],['tower','Towers'],['banner','Banners'],['terrain','Terrain']].forEach(([slot,label])=>{
      chunkyText(label, 18, yy, 15, '#fff', null, '600', 'left');
      SKIN_CAT[slot].forEach((it,i)=>{ drawChip(it, 12+i*92, yy+8, 88, 58); });
      yy += 86;
    });
  } else if (storeTab === 'mod'){
    chunkyText('Permanent upgrades — bought once, always active', W/2, 148, 11, '#dfe6ff', null, '500');
    let yy = 162;
    MOD_CAT.forEach(m=>{ drawStoreRow(m, yy, !!META.s.mods[m.id], 'ACTIVE'); yy += 64; });
  } else {
    chunkyText('Spend Gems to raise your Honor rank: '+honorRank(), W/2, 148, 11, '#ffd95e', null, '600');
    let yy = 162;
    PRESTIGE_CAT.forEach(p=>{ drawStoreRow(p, yy, META.s.owned.includes(p.id), 'OWNED'); yy += 64; });
  }
  drawMenuToast();
}
function drawBadges(){
  uiHits = []; menuBg(); menuHeader('BADGES');
  let changed = false;
  for (const b of BADGES) if (META.s.badges[b.id] && !META.s.seenBadges[b.id]){ META.s.seenBadges[b.id]=true; changed=true; }
  if (changed) META.save();
  const got = BADGES.filter(b=>META.s.badges[b.id]).length;
  chunkyText(got+' / '+BADGES.length+' earned', W/2, 116, 14, '#fff', null, '600');
  const cols=3, cw=148, ch=104, gx=14, gy=140, gap=8;
  BADGES.forEach((b,i)=>{
    const x=gx+(i%cols)*(cw+gap), y=gy+Math.floor(i/cols)*(ch+gap), have=!!META.s.badges[b.id];
    orr(x, y, cw, ch, 12, 'rgba(255,255,255,0.12)', have?'#ffd95e':'rgba(255,255,255,0.22)', have?3:2);
    ocirc(x+cw/2, y+30, 18, have?'#ffd95e':'#5a6488', have?'#a8761c':'#3a4060', 3);
    if (have) star(x+cw/2, y+30, 10, '#fff', '#a8761c');
    else chunkyText('?', x+cw/2, y+31, 18, '#aab4d0', null, '700');
    chunkyText(b.name, x+cw/2, y+58, 11, have?'#fff':'#aab4d0', null, '600');
    chunkyText(b.desc, x+cw/2, y+73, 8.5, have?'#dfe6ff':'#8a93b8', null, '500');
    honorIcon(x+cw/2-16, y+91, 5);
    chunkyText('+'+b.honor+' Honor', x+cw/2-6, y+92, 9, '#ffd95e', null, '600', 'left');
  });
  drawMenuToast();
}
function drawTitleMenu(){
  uiHits = [];
  drawWallet(W/2-95, 10);
  chunkyText('Rank: ' + honorRank(), W/2, 54, 13, '#ffd95e', '#5a3a0a', '600');
  chunkyBtn(W/2-168, 662, 160, 46, '#ffce5a', '#dba32c', '#9c6f12', 'STORE', 22);
  hit(W/2-168, 662, 160, 46, ()=>{ mode='store'; storeTab='cos'; });
  chunkyBtn(W/2+8, 662, 160, 46, '#c9a2e8', '#9a6fc4', '#5d3a8a', 'BADGES', 20);
  hit(W/2+8, 662, 160, 46, ()=>{ mode='badges'; });
  if (hasNewBadge()){ ocirc(W/2+160, 660, 8, '#ff5e4d', '#fff', 2.5); }
}
</script>
