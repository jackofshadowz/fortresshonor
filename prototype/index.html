function gableRoof(cx, y, w, h, t){
  opoly([[cx-w/2, y],[cx, y-h],[cx+w/2, y]], t.roof, t.ink, 3.5);
  opoly([[cx, y],[cx, y-h],[cx+w/2, y]], 'rgba(0,0,0,0.14)', null);
  glint(cx-w*0.13, y-h*0.45, 2.2);
}
function coneRoof(cx, y, w, h, t){
  orr(cx-w/2-3, y-3, w+6, 7, 3.5, t.roofD, t.ink, 3);
  opoly([[cx-w/2, y-3],[cx, y-h],[cx+w/2, y-3]], t.roof, t.ink, 3.5);
  opoly([[cx, y-3],[cx, y-h],[cx+w/2, y-3]], 'rgba(0,0,0,0.14)', null);
  glint(cx-w*0.12, y-h*0.5, 2.2);
}
function cren(cx, y, w){
  orr(cx-w/2-3, y-4, w+6, 8, 3.5, '#efe5cb', WALL_INK, 3);
  const n = Math.max(2, Math.round(w/13)), span = w+6;
  for (let i=0;i<n;i++){
    const tx = cx - span/2 + (i+0.5)*(span/n) - 4;
    orr(tx, y-11, 8, 9, 2.5, WALL_FILL, WALL_INK, 2.5);
  }
}
function flag(x, y, len, col, ink){
  ctx.strokeStyle = '#6b441e'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y-len); ctx.stroke();
  const wv = Math.sin(time*5 + x)*1.6;
  opoly([[x, y-len],[x+11+wv, y-len+3.5],[x, y-len+7]], col, ink, 2);
}
function goldBand(cx, y, w){
  orr(cx-w/2, y, w, 5, 2.5, '#ffd95e', '#a8761c', 2.2);
  glint(cx-w*0.28, y+2.5, 1.4);
}
function ironBand(cx, y, w){
  orr(cx-w/2-1, y, w+2, 5, 2.5, '#7d8494', '#4a4f5e', 2);
  ctx.fillStyle = '#4a4f5e';
  ctx.beginPath(); ctx.arc(cx-w*0.3, y+2.5, 1.2, 0, 7); ctx.arc(cx+w*0.3, y+2.5, 1.2, 0, 7); ctx.fill();
}
function star(x, y, r, fill, ink){
  const pts = [];
  for (let i=0;i<10;i++){
    const a = -Math.PI/2 + i*Math.PI/5, rad = i%2 ? r*0.45 : r;
    pts.push([x+Math.cos(a)*rad, y+Math.sin(a)*rad]);
  }
  opoly(pts, fill, ink, 2);
}
function aura(cx, cy, r, col){
  ctx.save(); ctx.globalAlpha = 0.32 + Math.sin(time*2.5)*0.08;
  const g = ctx.createRadialGradient(cx, cy, 4, cx, cy, r);
  g.addColorStop(0, col); g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.restore();
}
function peekHead(x, y, s, helm, helmInk){
  ocirc(x, y, 5.5*s, '#ffd9a8', '#a8764a', 2);
  ctx.fillStyle = helm;
  ctx.beginPath(); ctx.arc(x, y-0.5*s, 5.8*s, Math.PI*1.04, -Math.PI*0.04); ctx.fill();
  ctx.strokeStyle = helmInk; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(x-2*s, y+1.6*s, 0.95*s, 0, 7); ctx.arc(x+2*s, y+1.6*s, 0.95*s, 0, 7); ctx.fill();
}
function barrel(bx, by, len, rad, rec, ang){
  ctx.save(); ctx.translate(bx, by); ctx.rotate(ang); ctx.translate(-(rec||0)*9, 0);
  orr(-4, -rad, len, rad*2, rad, '#4a4f5e', '#262833', 2.5);
  orr(len-7, -rad-1.5, 6, rad*2+3, 3, '#5d6375', '#262833', 2.5);
  orr(-4, -rad, 4.5, rad*2, 2, '#ffd95e', '#a8761c', 2);
  glint(len*0.3, -rad*0.3, 1.5);
  ctx.restore();
}
function crystal(x, y, sz, glow){
  if (glow){ ctx.save(); ctx.shadowColor = '#9cd9ff'; ctx.shadowBlur = 9; }
  opoly([[x, y-sz],[x+sz*0.62, y],[x, y+sz*0.72],[x-sz*0.62, y]], '#bfe6ff', '#3c7fd0', 2.5);
  if (glow) ctx.restore();
  opoly([[x, y-sz],[x+sz*0.62, y],[x, y]], 'rgba(255,255,255,0.55)', null);
}
function icicles(cx, y, w){
  ctx.fillStyle = 'rgba(225,243,255,0.95)';
  for (let ix=-w*0.38; ix<=w*0.38; ix+=7){
    ctx.beginPath(); ctx.moveTo(cx+ix-2, y+3); ctx.lineTo(cx+ix+2, y+3);
    ctx.lineTo(cx+ix, y+8+Math.abs(ix)*0.12); ctx.closePath(); ctx.fill();
  }
}
function motes(cx, cy, n){
  ctx.fillStyle = 'rgba(190,228,255,0.9)';
  for (let k=0;k<n;k++){
    const a = time*1.6 + k*2.1;
    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*16, cy+Math.sin(a*1.3)*7, 1.7, 0, 7); ctx.fill();
  }
}

/* ---------- the three building lines, five tiers each ---------- */
function drawArcherTower(cx, baseY, tier, t){
  if (tier===1){
    bodyBlock(cx, baseY-16, baseY, 26, {door:true});
    gableRoof(cx, baseY-15, 34, 15, t);
  } else if (tier===2){
    bodyBlock(cx, baseY-24, baseY, 28, {door:true, win:true});
    coneRoof(cx, baseY-24, 36, 24, t);
    flag(cx, baseY-47, 13, t.roof, t.ink);
  } else if (tier===3){
    bodyBlock(cx, baseY-30, baseY, 32, {door:true, win:true});
    cren(cx, baseY-30, 32);
    peekHead(cx, baseY-39, 1, t.roof, t.ink);
    flag(cx+17, baseY-36, 14, t.roof, t.ink);
  } else if (tier===4){
    bodyBlock(cx+11, baseY-26, baseY, 20, {win:true});
    coneRoof(cx+11, baseY-26, 26, 18, t);
    bodyBlock(cx-11, baseY-33, baseY, 20, {win:true});
    goldBand(cx-11, baseY-31, 20);
    coneRoof(cx-11, baseY-33, 26, 21, t);
    bodyBlock(cx, baseY-13, baseY, 16, {door:true});
    flag(cx-11, baseY-52, 12, '#ffd95e', '#a8761c');
  } else {
    aura(cx, baseY-34, 46, t.trim);
    bodyBlock(cx, baseY-20, baseY, 46, {door:true});
    cren(cx, baseY-20, 46);
    bodyBlock(cx-15, baseY-37, baseY-17, 16, {});
    bodyBlock(cx+15, baseY-37, baseY-17, 16, {});
    coneRoof(cx-15, baseY-37, 21, 16, t);
    coneRoof(cx+15, baseY-37, 21, 16, t);
    bodyBlock(cx, baseY-46, baseY-15, 20, {win:true});
    goldBand(cx, baseY-46, 20);
    coneRoof(cx, baseY-46, 27, 23, t);
    star(cx, baseY-75, 6.5, '#ffd95e', '#a8761c');
  }
}
function drawCannonKeep(cx, baseY, tier, t, recoil){
  const rec = recoil || 0;
  if (tier===1){
    orr(cx-16, baseY-12, 32, 12, 6, '#e8cf96', '#b3955a', 3);
    for (const sx of [-9, 0, 9]) orr(cx+sx-7, baseY-17, 14, 8, 4, '#f2dca6', '#b3955a', 2.5);
    barrel(cx-2, baseY-16, 13, 4.5, rec, -0.9);
  } else if (tier===2){
    bodyBlock(cx, baseY-22, baseY, 30, {door:true});
    cren(cx, baseY-22, 30);
    barrel(cx-2, baseY-27, 17, 4, rec, -0.55);
  } else if (tier===3){
    bodyBlock(cx, baseY-28, baseY, 32, {door:true, win:true});
    ironBand(cx, baseY-15, 32);
    cren(cx, baseY-28, 32);
    barrel(cx-2, baseY-33, 20, 4.5, rec, -0.55);
    flag(cx+17, baseY-34, 13, t.roof, t.ink);
  } else if (tier===4){
    bodyBlock(cx, baseY-32, baseY, 38, {door:true, win:true});
    ironBand(cx, baseY-18, 38);
    cren(cx, baseY-32, 38);
    goldBand(cx, baseY-28, 30);
    barrel(cx-11, baseY-37, 17, 3.8, rec, -0.62);
    barrel(cx+9, baseY-35, 17, 3.8, rec, -0.45);
    flag(cx-20, baseY-38, 12, t.roof, t.ink);
  } else {
    aura(cx, baseY-34, 46, t.trim);
    bodyBlock(cx, baseY-20, baseY, 46, {door:true});
    cren(cx, baseY-20, 46);
    barrel(cx-18, baseY-24, 14, 3.4, rec, -0.75);
    barrel(cx+14, baseY-24, 14, 3.4, rec, -0.35);
    bodyBlock(cx, baseY-40, baseY-15, 26, {win:true});
    ironBand(cx, baseY-31, 26);
    cren(cx, baseY-40, 26);
    goldBand(cx, baseY-36, 22);
    barrel(cx-2, baseY-46, 26, 6, rec, -0.55);
    star(cx+19, baseY-46, 5.5, '#ffd95e', '#a8761c');
  }
}
function drawFrostSpire(cx, baseY, tier, t){
  if (tier===1){
    orr(cx-13, baseY-10, 26, 10, 5, '#dfeefb', ICE.ink, 3);
    crystal(cx, baseY-19, 11, true);
    crystal(cx-9, baseY-13, 6, false);
    crystal(cx+9, baseY-13, 6, false);
  } else if (tier===2){
    opoly([[cx-9, baseY],[cx-6, baseY-26],[cx+6, baseY-26],[cx+9, baseY]], ICE.fill, ICE.ink, 3);
    ctx.fillStyle = ICE.shade; ctx.fillRect(cx+1, baseY-25, 5, 24);
    crystal(cx, baseY-33, 9, true);
    motes(cx, baseY-28, 2);
  } else if (tier===3){
    bodyBlock(cx, baseY-26, baseY, 30, {door:true, win:true, pal:ICE});
    coneRoof(cx, baseY-26, 36, 24, t);
    icicles(cx, baseY-29, 36);
    crystal(cx, baseY-54, 7, true);
    motes(cx, baseY-30, 3);
  } else if (tier===4){
    bodyBlock(cx, baseY-32, baseY, 34, {door:true, win:true, pal:ICE});
    goldBand(cx, baseY-30, 26);
    coneRoof(cx, baseY-32, 40, 27, t);
    icicles(cx, baseY-35, 40);
    crystal(cx, baseY-64, 9, true);
    for (let k=0;k<3;k++){
      const a = time*1.8 + k*2.1;
      crystal(cx+Math.cos(a)*22, baseY-34+Math.sin(a)*9, 4, false);
    }
  } else {
    aura(cx, baseY-36, 48, t.trim);
    bodyBlock(cx, baseY-20, baseY, 46, {door:true, pal:ICE});
    bodyBlock(cx-15, baseY-34, baseY-16, 15, {pal:ICE});
    bodyBlock(cx+15, baseY-34, baseY-16, 15, {pal:ICE});
    coneRoof(cx-15, baseY-34, 19, 14, t);
    coneRoof(cx+15, baseY-34, 19, 14, t);
    bodyBlock(cx, baseY-44, baseY-14, 20, {win:true, pal:ICE});
    goldBand(cx, baseY-44, 20);
    coneRoof(cx, baseY-44, 26, 22, t);
    icicles(cx, baseY-47, 26);
    crystal(cx, baseY-74, 10, true);
    for (let k=0;k<4;k++){
      const a = time*1.6 + k*1.6;
      crystal(cx+Math.cos(a)*26, baseY-40+Math.sin(a)*11, 4, false);
    }
  }
}
function badge(bx, by, n){
  ocirc(bx, by, 8.5, '#ffd95e', '#a8761c', 2.5);
  glint(bx-2.5, by-2.5, 1.6);
  ctx.fillStyle = '#7a4f12';
  ctx.font = '600 11px Fredoka, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(n, bx, by+0.5);
}
function drawBuilding(x, y, type, tier, recoil){
  const t = TYPES[type];
  const cx = x + CELL/2, baseY = y + CELL - 7;
  ctx.fillStyle = 'rgba(40,75,20,0.25)';
  ctx.beginPath(); ctx.ellipse(cx, baseY+3, 22+tier*2.6, 6, 0, 0, 7); ctx.fill();
  ctx.save();
  ctx.translate(cx, baseY); ctx.scale(1.2, 1.2); ctx.translate(-cx, -baseY); // fill the tile, chunky-style
  ctx.translate(0, recoil ? recoil*10 : 0);
  if (type==='archer')      drawArcherTower(cx, baseY, tier, t);
  else if (type==='cannon') drawCannonKeep(cx, baseY, tier, t, recoil);
  else                      drawFrostSpire(cx, baseY, tier, t);
  ctx.restore();
  badge(cx-17, baseY-4, tier);
}
function drawBuildings(dt){
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    const g = grid[idx(c,r)];
    if (!g) continue;
    if (g.obstacle){
      const ox = cellX(c)+CELL/2, oy = cellY(r)+CELL/2;
      if (g.obstacle === 'tree') drawTree(ox, oy+6, 1.5, c*7+r);
      else drawRock(ox, oy+10, 13);
      if (sellTarget && sellTarget.c===c && sellTarget.r===r){
        orr(cellX(c)+3, cellY(r)+3, CELL-6, CELL-6, 10, null, '#ffd95e', 4);
      }
      continue;
    }
    if (g.pop !== undefined){ g.pop += dt*4; if (g.pop>=1) delete g.pop; }
    if (g.recoil) g.recoil = Math.max(0, g.recoil - dt);
    // coverage ring for shooter buildings (so you can see — and place around — their limited range)
    if (mode==='build' && TYPES[g.type] && TYPES[g.type].shoots){
      const rcx = cellX(c)+CELL/2, rcy = cellY(r)+CELL/2, rng = TIER_RANGE[Math.min(g.tier,5)-1] * (RUN ? RUN.rangeMult : 1);
      ctx.save(); ctx.beginPath(); ctx.arc(rcx, rcy, rng, 0, 7);
      ctx.fillStyle='rgba(122,196,255,0.05)'; ctx.fill();
      ctx.strokeStyle='rgba(122,196,255,0.30)'; ctx.lineWidth=1.5; ctx.setLineDash([5,7]); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
    const pop = g.pop !== undefined ? 1 + Math.sin(Math.min(g.pop,1)*Math.PI)*0.18 : 1;
    ctx.save();
    ctx.translate(cellX(c)+CELL/2, cellY(r)+CELL/2);
    ctx.scale(pop, pop);
    ctx.translate(-(cellX(c)+CELL/2), -(cellY(r)+CELL/2));
    drawBuilding(cellX(c), cellY(r), g.type, g.tier, g.recoil||0);
    ctx.restore();
    // building health during a siege
    if (mode==='fight' && g.hp !== undefined && g.hp < g.maxhp){
      const bw2 = 38, hx = cellX(c)+CELL/2, hy2 = cellY(r)+CELL-2;
      orr(hx-bw2/2-1, hy2-1, bw2+2, 7, 3.5, 'rgba(38,35,58,0.92)', null);
      const f = Math.max(0, g.hp/g.maxhp);
      ctx.fillStyle = f>0.5 ? '#7ee860' : f>0.25 ? '#ffcf4d' : '#ff5e4d';
      rr(hx-bw2/2, hy2, Math.max(3, bw2*f), 5, 2.5); ctx.fill();
    }
    if (sellTarget && sellTarget.c===c && sellTarget.r===r){
      orr(cellX(c)+3, cellY(r)+3, CELL-6, CELL-6, 10, null, '#ffd95e', 4);
    }
  }
}

/* ============================================================
   ENEMIES — chibi bestiary (big heads, dot eyes, huge weapons)
   ============================================================ */
function dotEyes(x1, x2, y, r2){
  ctx.fillStyle = INK;
  ctx.beginPath(); ctx.arc(x1, y, r2, 0, 7); ctx.arc(x2, y, r2, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(x1-r2*0.3, y-r2*0.3, r2*0.35, 0, 7); ctx.arc(x2-r2*0.3, y-r2*0.3, r2*0.35, 0, 7); ctx.fill();
}
function stubLegs(r, step, col, ink){
  const lk = step*r*0.16, rk = -step*r*0.16;
  orr(-r*0.42, r*0.45+lk, r*0.34, r*0.5, r*0.17, col, ink, 2.5);
  orr( r*0.08, r*0.45+rk, r*0.34, r*0.5, r*0.17, col, ink, 2.5);
}
function limb(x1, y1, x2, y2, w, col, ink){
  ctx.lineCap = 'round';
  ctx.strokeStyle = ink; ctx.lineWidth = w*1.55;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.strokeStyle = col; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}

/* ---------- THE chibi formula (shared by every character) ----------
   Head = half the character. Eyes low on the face, blush cheeks,
   hats are oversized caps, arms are nubs, weapons dwarf the body.
   Origin = feet centre; r = head radius. Returns head centre/radius. */
function drawProp(kind, px, py, r){
  if (kind === 'sword' || kind === 'greatsword'){
    const L = kind==='greatsword' ? 2.6*r : 1.9*r;
    ctx.save(); ctx.translate(px, py); ctx.rotate(0.14);
    orr(-0.09*r, 0.1*r, 0.18*r, 0.5*r, 0.09*r, '#46280f', '#26233a', 2);
    orr(-0.42*r, -0.02*r, 0.84*r, 0.2*r, 0.1*r, '#ffd95e', '#a8761c', 2);
    opoly([[-0.14*r,-0.02*r],[-0.14*r,-L],[0,-L-0.28*r],[0.14*r,-L],[0.14*r,-0.02*r]], '#e3e9f0', '#6e7681', 2.4);
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = Math.max(1.2, r*0.06);
    ctx.beginPath(); ctx.moveTo(-0.03*r,-0.3*r); ctx.lineTo(-0.03*r,-L+0.2*r); ctx.stroke();
    ctx.restore();
  } else if (kind === 'cleaver'){
    ctx.save(); ctx.translate(px, py); ctx.rotate(-0.35);
    orr(-0.08*r, 0.05*r, 0.16*r, 0.45*r, 3, '#6b441e', '#46280f', 2);
    opoly([[-0.1*r,0],[-0.1*r,-1.5*r],[0.55*r,-1.62*r],[0.6*r,-0.2*r]], '#d7dde4', '#6e7681', 2.4);
    glint(0.12*r, -1.0*r, 0.1*r);
    ctx.restore();
  } else if (kind === 'club'){
    ctx.save(); ctx.translate(px, py); ctx.rotate(0.3);
    orr(-0.1*r, -0.5*r, 0.2*r, 0.9*r, 0.1*r, '#9a6a3c', '#5d3a1e', 2.2);
    ocirc(0, -1.05*r, 0.62*r, '#b3823f', '#5d3a1e', 2.6);
    ctx.fillStyle = '#e8e4da';
    for (let k=0;k<5;k++){ const a=k*1.26-0.5;
      ctx.beginPath(); ctx.arc(Math.cos(a)*0.45*r, -1.05*r+Math.sin(a)*0.45*r, 0.08*r, 0, 7); ctx.fill(); }
    ctx.restore();
  } else if (kind === 'dagger'){
    ctx.save(); ctx.translate(px, py); ctx.rotate(0.5);
    orr(-0.07*r, 0.05*r, 0.14*r, 0.32*r, 2, '#46280f', '#26233a', 1.8);
    opoly([[-0.1*r,0],[0,-1.0*r],[0.1*r,0]], '#d7dde4', '#6e7681', 2);
    ctx.restore();
  } else if (kind === 'bow'){
    ctx.save(); ctx.translate(px, py);
    ctx.strokeStyle = '#5d3a1e'; ctx.lineWidth = r*0.16; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0, 0, 1.0*r, -1.25, 1.25); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = r*0.06;
    ctx.beginPath(); ctx.moveTo(Math.cos(-1.25)*r, Math.sin(-1.25)*r); ctx.lineTo(Math.cos(1.25)*r, Math.sin(1.25)*r); ctx.stroke();
    ctx.restore();
  } else if (kind === 'staff'){
    ctx.strokeStyle = '#9a6a3c'; ctx.lineWidth = r*0.16; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px, py+0.4*r); ctx.lineTo(px, py-1.6*r); ctx.stroke();
    ctx.save(); ctx.shadowColor = '#9cd9ff'; ctx.shadowBlur = 7;
    ocirc(px, py-1.7*r, 0.3*r, '#bfe6ff', '#3c7fd0', 2); ctx.restore();
  } else if (kind === 'basket'){
    orr(px-0.4*r, py-0.1*r, 0.8*r, 0.5*r, 0.15*r, '#caa66a', '#8a6a3a', 2);
    ocirc(px-0.15*r, py-0.18*r, 0.14*r, '#ff5e6e', null);
    ocirc(px+0.14*r, py-0.2*r, 0.14*r, '#7ed05f', null);
  } else if (kind === 'hammer'){
    ctx.save(); ctx.translate(px, py); ctx.rotate(0.4);
    ctx.strokeStyle = '#9a6a3c'; ctx.lineWidth = r*0.14; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,0.3*r); ctx.lineTo(0,-0.8*r); ctx.stroke();
    orr(-0.4*r, -1.1*r, 0.8*r, 0.4*r, 0.12*r, '#7d8494', '#4a4f5e', 2);
    ctx.restore();
  }
}
function drawHat(kind, o, r, hy){
  if (!kind || kind === 'none') return;
  if (kind === 'knight'){
    ctx.fillStyle = '#dde4ee';
    ctx.beginPath(); ctx.arc(0, hy-0.08*r, 1.06*r, Math.PI*1.02, -Math.PI*0.02); ctx.fill();
    ctx.strokeStyle = '#6e7681'; ctx.lineWidth = 2.4; ctx.stroke();
    orr(-1.06*r, hy-0.16*r, 2.12*r, 0.3*r, 0.14*r, '#aab3c2', '#6e7681', 2);
    glint(-0.45*r, hy-0.62*r, 0.16*r);
    if (o.plume){
      ctx.strokeStyle = '#ff5e6e'; ctx.lineWidth = r*0.26; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0, hy-1.05*r);
      ctx.quadraticCurveTo(0.15*r, hy-1.6*r, 0.55*r+Math.sin(time*3)*r*0.08, hy-1.5*r); ctx.stroke();
    }
  } else if (kind === 'fullhelm'){
    ocirc(0, hy, 1.06*r, o.hatCol||'#5d5878', o.hatInk||'#26233a', 2.8);

function drawChibi(r, o){

  }
  // nub legs
  const lk = step*r*0.14, rk = -step*r*0.14;
  orr(-0.38*r, -0.5*r+lk, 0.34*r, 0.54*r, 0.17*r, o.pants||'#7d8494', o.pantsInk||'#4a4f5e', 2);

  // tiny tunic body
  const bw = o.wide ? 1.5 : 1;
  opoly([[-0.55*r*bw,-0.3*r],[-0.42*r*bw,-1.1*r],[0.42*r*bw,-1.1*r],[0.55*r*bw,-0.3*r]], o.tunic, o.tunicInk, 2.4);
  if (o.belt){ orr(-0.5*r*bw, -0.62*r, r*bw, 0.16*r, 0.08*r, o.belt, null); }
  if (o.emblem) star(0, -0.68*r, 0.24*r, '#ffd95e', '#a8761c');
  // left nub arm (or shield)
  if (o.shield){
    ocirc(-0.6*r*bw, -0.74*r, 0.18*r, o.tunic, o.tunicInk, 2);
    ocirc(-0.8*r*bw, -0.72*r, 0.46*r, '#9a6a3c', '#5d3a1e', 2.4);
    ocirc(-0.8*r*bw, -0.72*r, 0.16*r, '#ffd95e', '#a8761c', 1.6);
  } else {
    ocirc(-0.56*r*bw, -0.74*r, 0.17*r, skin, skinInk, 2);

  // weapon arm: oversized prop, then mitten fist over the grip
  const px = 0.62*r*bw, py = -0.76*r - sw;

  ocirc(px, py, 0.19*r, o.mitten || skin, o.mitten ? '#6e7681' : skinInk, 2);

function drawEnemy(e){

  ctx.fillStyle = 'rgba(20,50,30,0.25)';
  ctx.beginPath(); ctx.ellipse(e.x, e.y + r*0.95, r*0.85, 4.5, 0, 0, 7); ctx.fill();

  const frosty = hasBuff(e,'slow');
  ctx.save();
  ctx.translate(e.x, y);
  if (e.spawnT > 0){ const k = 1 - e.spawnT/0.4; ctx.scale(k, k); }   // grow in from the treeline
  if (e.hitT > 0){ const k = 1 + e.hitT*0.9; ctx.scale(k, 2-k); } // squash-pop on hit
  if (frosty) ctx.filter = 'sepia(1) hue-rotate(165deg) saturate(2.6) brightness(0.92)';   // frozen-blue tint on the whole unit
  ((typeof ENEMY_DRAW !== 'undefined' && ENEMY_DRAW[e.kind]) || drawDarkKnight)(r, step, e);
  if (frosty) ctx.filter = 'none';
  ctx.restore();

  // a couple of frost shards instead of a flat blue disc
  if (frosty){
    crystal(e.x-r*0.7, y-r*0.9, 5, false);
    crystal(e.x+r*0.7, y-r*0.5, 4, false);

    ctx.fillStyle = 'rgba(120,215,70,0.32)';

      const fx2 = e.x+(i-1)*r*0.5, fy = y - r*0.6 - (Math.sin(time*12+i*2+e.wob)*0.5+0.5)*r*0.55;
      ocirc(fx2, fy, 2.6, '#ff7b3f', null); ocirc(fx2, fy-2, 1.5, '#ffd95e', null);
    }

    for (let i=0;i<3;i++){ const a = time*6 + i*2.1;
      ocirc(e.x + Math.cos(a)*r*0.8, y - r*1.35 + Math.sin(a)*3, 2.2, '#ffe06a', null); }

    }
  }
}

function drawTrayPiece(piece, sx, sy, size, dim){
  if (!piece) return;
  const cells = piece.shape;
  const maxC = Math.max(...cells.map(p=>p[0]))+1, maxR = Math.max(...cells.map(p=>p[1]))+1;
  const cs = Math.min(size/maxC, size/maxR, 27);
  const ox = sx - (maxC*cs)/2, oy = sy - (maxR*cs)/2;
  const t = TYPES[piece.type];
  for (const [c,r] of cells){
    const bx = ox + c*cs, by = oy + r*cs, mx = bx+cs/2;
    if (dim){ orr(bx+1.5, by+1.5, cs-3, cs-3, 6, 'rgba(150,140,110,0.5)', null); continue; }
    // grass tile
    orr(bx+1, by+1, cs-2, cs-2, 7, '#9ed468', '#6aa844', 2.5);
    // mini building
    const footY = by+cs*0.88, eaveY = by+cs*0.46, bw = cs*0.52;
    orr(mx-bw/2, eaveY, bw, footY-eaveY, 2.5, WALL_FILL, WALL_INK, 2);
    if (piece.type === 'cannon'){
      orr(mx-bw/2-2, eaveY-cs*0.1, bw+4, cs*0.12, 2, '#efe5cb', WALL_INK, 2);
      orr(mx-bw/2-1, eaveY-cs*0.2, cs*0.13, cs*0.12, 1.5, WALL_FILL, WALL_INK, 1.5);
      orr(mx+bw/2-cs*0.12, eaveY-cs*0.2, cs*0.13, cs*0.12, 1.5, WALL_FILL, WALL_INK, 1.5);
      ctx.save(); ctx.translate(mx, eaveY-cs*0.12); ctx.rotate(-0.55);
      orr(-1.5, -2.2, cs*0.36, 4.4, 2.2, '#4a4f5e', '#262833', 1.5);
      ctx.restore();
    } else {
      opoly([[mx-bw*0.74, eaveY],[mx, eaveY-cs*0.4],[mx+bw*0.74, eaveY]], t.roof, t.ink, 2.2);
      if (piece.type === 'frost') crystal(mx, eaveY-cs*0.48, cs*0.12, false);
    }
  }
}

function toLogical(ev){
  const r = cv.getBoundingClientRect();
  return { x: (ev.clientX - r.left) / SCALE - OX, y: (ev.clientY - r.top) / SCALE - OY };
}
function inRect(p, r){ return p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function cellAt(p){
  const c = Math.floor((p.x - GX) / CELL), r = Math.floor((p.y - GY) / CELL);
  if (c<0||c>=COLS||r<0||r>=ROWS) return null;
  return { c, r };
}
function anchorFor(piece, p){
  const maxC = Math.max(...piece.shape.map(s=>s[0]));
  const maxR = Math.max(...piece.shape.map(s=>s[1]));
  const c = Math.round((p.x - GX) / CELL - maxC/2 - 0.5);
  const r = Math.round((p.y - GY) / CELL - maxR/2 - 0.5);
  return { c, r };
}

let last = performance.now();

  if (!assetsReady()){

  }

  ctx.clearRect(VX0,VY0,VXW,VYH);
  ctx.save();

  if (shake > 0){

  if (mode === 'title'){

    (mode === 'store' ? drawStore : mode === 'badges' ? drawBadges : mode === 'heroes' ? drawHeroes : mode === 'gear' ? drawGear : mode === 'codex' ? drawCodex : drawKingdom)();
    ctx.restore();
    requestAnimationFrame(frame);
    return;
  }
  if (mode === 'map'){ drawMap(); ctx.restore(); requestAnimationFrame(frame); return; }

  if (mode === 'fight') updateFight(dt);
  if (mode === 'build' || mode === 'fight') tickMines(dt);   // gold mines fund the town in build AND battle
  updateVillagers(dt);
  updateHero(dt);
  if (mode === 'clear'){
    clearT += dt;
    if (clearT > 1.1){
      // blessings are no longer guaranteed — roll for one after each round
      if (Math.random() < 0.28){ perkChoices = rollPerks(); mode = 'perk'; banner('✦ A BLESSING! ✦', '#ffd95e'); }
      else { mode = 'build'; banner('WAVE ' + wave, '#ffd95e'); }
    }
  }

  updateCam(dt);
  drawSea();                       // sea + sky stay screen-space (backdrop)
  drawClouds();
  drawGulls();
  ctx.save(); applyCam();          // --- world camera (pans/zooms to the wall on a wave) ---
  drawIsland();
  metaTerrainWash();               // tint the GROUND only (before the town/buildings so they aren't washed olive)
  drawCity();                      // the growing medieval town behind the wall
  drawGrid();
  drawCorpses();
  drawWall();
  drawBuildings(dt);
  drawMergeHints();
  drawVillagers();
  drawHero();
  drawAllies();
  for (const e of enemies.slice().sort((a,b)=>a.y-b.y)) drawEnemy(e);
  for (const pr of projectiles) drawProjectile(pr);
  drawEprojs();
  drawParticles(dt);
  drawFx(dt);
  drawFloaters(dt);                // world-anchored combat text rides the camera
  ctx.restore();                   // --- end world camera ---
  if (mode === 'build' || mode === 'clear') drawTray(); else if (mode === 'fight') drawFightHUD();
  guardUpBtn = null;   // (removed: archers now come from Archery buildings, not a wall upgrade)
  // pay-to-repair: the wall and razed cottages stay ruined until you fund them
  repairWallBtn = null; rebuildBtn = null;
  if (mode === 'build' && wallHP < wallMax){
    const cost = Math.ceil((wallMax - wallHP) * 0.6), gs = toScreen((FIELD_L+FIELD_R)/2, WALL_Y + 22);
    const bw=156, bh=28, bx=Math.round(gs.x-bw/2), by=Math.round(gs.y), ok = gold >= cost;
    chunkyBtn(bx, by, bw, bh, ok?'#7fc4ff':'#8a8a94', ok?'#3b80d2':'#5e5e68', ok?'#1d5a8a':'#3a3a44', 'REPAIR WALL '+cost+'g', 12);
    repairWallBtn = { x:bx, y:by, w:bw, h:bh, cost };
  }
  if (mode === 'build' && cityDamage > 0){
    const cost = cityDamage * 30, gs = toScreen(W/2, CITY_TOP + 72);
    const bw=170, bh=28, bx=Math.round(gs.x-bw/2), by=Math.round(gs.y), ok = gold >= cost;
    chunkyBtn(bx, by, bw, bh, ok?'#7ed05f':'#8a8a94', ok?'#56a83c':'#5e5e68', ok?'#2e6326':'#3a3a44', 'REBUILD TOWN '+cost+'g', 12);
    rebuildBtn = { x:bx, y:by, w:bw, h:bh, cost };
  }
  sellBtnRect = drawSellButton();
  drawHUD();
  // the lifted unit follows the cursor — drawn in the HUD pass (screen space) so it's never hidden behind the tray
  if (dragUnit){
    const u = draggedUnit();
    if (isUnit(u)){
      ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(ptr.x, ptr.y+18, 22, 6, 0, 0, 7); ctx.fill();

  if (mode === 'build' && shopOpen) drawShop();
  if (mode === 'over') drawOver();
  if (mode === 'won') drawWon();

  ctx.restore();
  requestAnimationFrame(frame);
}

/* ---------- projectiles & effects ---------- */
function drawProjectile(p){
  const dx = p.tx-p.x, dy = p.ty-p.y;
  if (p.kind === 'arrow'){
    // the arrow sprite points RIGHT natively — rotate to flight direction
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(dy, dx));
    const im = I('arrow');
    if (im.complete && im.naturalWidth) ctx.drawImage(im, 0, 0, 64, 64, -17, -8.5, 34, 17);
    ctx.restore();
  } else if (p.kind === 'ball'){
    spr('dynamite', 64, 64, Math.floor(time*14)%6, 0, p.x, p.y, 0.55, false, 0.5);
  } else {
    const d = Math.hypot(dx,dy)||1;
    ctx.strokeStyle = 'rgba(160,220,255,0.5)'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - dx/d*14, p.y - dy/d*14); ctx.stroke();
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(time*7);
    crystal(0, 0, 7, true);
    ctx.restore();
  }
}
let fx = [];
function addFx(kind, x, y, s){ fx.push({ kind, x, y, s: s||0.65, t: 0 }); }
function drawCorpses(){
  // fallen foes linger on the field, under everything that still moves
  for (const f of fx){
    if (f.kind !== 'dead') continue;
    const fr = Math.min(6, Math.floor(f.t/0.09));
    ctx.globalAlpha = f.t < 1.4 ? 1 : Math.max(0, 1 - (f.t-1.4)/0.8);
    spr('dead', 128, 128, fr, 1, f.x, f.y, f.s, false, 0.7);
    ctx.globalAlpha = 1;
  }
}
function drawFx(dt){
  for (const f of fx){
    f.t += dt;
    if (f.kind === 'explosion'){
      const fr = Math.floor(f.t/0.07);
      if (fr < 9) spr('explosions', 192, 192, fr, 0, f.x, f.y, f.s, false, 0.6);
    }
  }
  fx = fx.filter(f => f.t < (f.kind === 'dead' ? 2.2 : 0.63));
}

function drawTitleCastle(cx, baseY){

function drawTrayPiece(piece, sx, sy, size, dim){
  if (!piece) return;
  const cells = piece.shape;
  const maxC = Math.max(...cells.map(p=>p[0]))+1, maxR = Math.max(...cells.map(p=>p[1]))+1;
  const cs = Math.min(size/maxC, size/maxR, 27);
  const ox = sx - (maxC*cs)/2, oy = sy - (maxR*cs)/2;
  for (const [c,r] of cells){
    const bx = ox + c*cs, by = oy + r*cs, mx = bx+cs/2;
    if (dim){ orr(bx+1.5, by+1.5, cs-3, cs-3, 6, 'rgba(150,140,110,0.5)', null); continue; }
    const rk = piece.rarity || 0;
    orr(bx+1, by+1, cs-2, cs-2, 7, '#9ed468', rk ? CONFIG.rarity.col[rk] : '#6aa844', rk ? 3.5 : 2.5);
    img({archer:'house1_b', cannon:'house2_r', frost:'house3_p'}[piece.type], mx, by+cs-3, 0.19);
  }
  if (!dim) typeGlyph(ox+9, oy+9, piece.type);
}

/* ---------- idle "AFK village" income (City/Meta spine) ----------
   The city produces Gems in real time while the app is closed, scaling with the
   prestige buildings you've raised. Claimed on load and on tab-return, capped so it
   stays a nudge — not an auto-win. Adapted from Fortress Merge's AFK village. */
const IDLE = { capH:8, base:3, granaryRate:5, warehouseCap:2,
               yield:{ p_statue:5, p_fountain:12, p_garden:25, p_cathedral:50, p_throne:100 } };
function idleRate(){                                  // gems per hour
  let r = IDLE.base + META.s.village.granary * IDLE.granaryRate;
  for (const id in IDLE.yield) if (META.s.owned.includes(id)) r += IDLE.yield[id];
  r += townLevel() * 0.6;       // a bigger town generates more gems while you're away
  return r;
}
function idleCapH(){ return IDLE.capH + META.s.village.warehouse * IDLE.warehouseCap; }
function granaryCost(){ return 40 + META.s.village.granary * 40; }     // leveled (VillageUpgradeData)
function warehouseCost(){ return 60 + META.s.village.warehouse * 60; }
function buyVillage(which){
  const cost = which === 'granary' ? granaryCost() : warehouseCost();
  if (spendGems(cost)){ META.s.village[which]++; META.save(); toast((which==='granary'?'Granary':'Warehouse')+' upgraded!'); sfx.merge(); }
  else toast('Need ' + cost + ' gems');
}
function claimIdle(){
  const now = Date.now(), last = META.s.lastSeen || now;
  const g = Math.floor(idleRate() * Math.min(idleCapH(), (now - last) / 3.6e6));
  if (g > 0) META.s.gems += g;
  META.s.lastSeen = now; META.save();
  return g;
}
function markAway(){ META.s.lastSeen = Date.now(); META.save(); }

  if (document.hidden) markAway();

});

function hexA(hex, a){ const n = parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function gradPanel(x,y,w,h,r,top,bot,ink,lw){
  const g = ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,top); g.addColorStop(1,bot);
  rr(x,y,w,h,r); ctx.fillStyle = g; ctx.fill();
  if (ink){ ctx.strokeStyle = ink; ctx.lineWidth = lw||3; ctx.lineJoin='round'; ctx.stroke(); }
}
function cardShine(x,y,w,h,r,phase){
  ctx.save(); rr(x,y,w,h,r); ctx.clip();
  const sw = w*0.45, sx = x - sw + ((time*0.45 + (phase||0)) % 2.2) * (w+sw)/2.2;
  const g = ctx.createLinearGradient(sx,0,sx+sw,0);
  g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(0.5,'rgba(255,255,255,0.22)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(x,y,w,h); ctx.restore();
}
function ribbon(x,y,text,col){
  const w = text.length*6.2+14; orr(x, y, w, 16, 5, col, '#1c2030', 2); chunkyText(text, x+w/2, y+8.5, 8.5, '#1c2030', null, '700'); return w;
}
function gemPile(cx, cy, n){
  const cnt = n>=1200?7:n>=550?5:n>=100?4:3;
  const P = [[0,-6,1.35],[-10,2,1.0],[10,2,1.0],[-5,9,0.8],[5,9,0.8],[-14,9,0.65],[14,9,0.65]];
  for (let i=0;i<cnt;i++){ const p=P[i]; gemIcon(cx+p[0], cy+p[1], 9*p[2]); }
}
function drawWallet(x, y){

  pillBg(x, y, 86, 30); gemIcon(x+17, y+15, 9);
  chunkyText(META.s.gems, x+31, y+16, 14, '#9fe8ff', null, '600', 'left');
  // Honor — prestige rank (right)
  pillBg(x+94, y, 96, 30); honorIcon(x+110, y+15, 9);
  chunkyText(META.s.honor, x+124, y+16, 14, '#ffd95e', null, '600', 'left');
}
function menuBg(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3f5aa0'); g.addColorStop(0.45,'#6878bc'); g.addColorStop(0.78,'#a896d4'); g.addColorStop(1,'#e6c6d4');
  ctx.fillStyle = g; ctx.fillRect(VX0,VY0,VXW,VYH);
  // soft sun glow up top
  const rg = ctx.createRadialGradient(W/2,-30,10,W/2,-30,W*0.95);
  rg.addColorStop(0,'rgba(255,250,222,0.28)'); rg.addColorStop(1,'rgba(255,250,222,0)');
  ctx.fillStyle = rg; ctx.fillRect(VX0,VY0,VXW,VYH);
  // twinkling stars in the upper sky
  for (let i=0;i<16;i++){
    const x=(i*167.3)%W, y=(i*97.7)%(H*0.4);
    ctx.globalAlpha=(0.2+0.6*Math.abs(Math.sin(time*1.2+i)))*0.5;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,(i%3)*0.4+1,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  // drifting floating islets to fill the scene with depth
  drawIslet(58, H*0.80 + Math.sin(time*1.1)*5, 0.42, true);
  drawIslet(W-54, H*0.70 + Math.sin(time*0.9+2)*6, 0.34, false);
  drawIslet(W*0.5, H*0.92 + Math.sin(time*1.3+1)*4, 0.3, true);
}
function menuHeader(title){

function chipPreview(it, cx, cy){
  if (it.slot === 'hero'){
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(cx, cy+27, 18, 5.5, 0, 0, 7); ctx.fill();
    spr(it.sprite||'warrior_b', 192,192, Math.floor(time*6)%6, 0, cx, cy+29, 0.37, false, 0.78);
  } else if (it.slot === 'tower'){
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(cx, cy+27, 20, 5.5, 0, 0, 7); ctx.fill();
    img('tower_'+(it.suffix||'b'), cx, cy+29, 0.37); if (it.glow) star(cx, cy-22, 8, '#ffe08a', '#a8761c');
  } else if (it.slot === 'banner'){
    // ornate draped banner on a pole
    ctx.strokeStyle = '#6e4a22'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx-16, cy-24); ctx.lineTo(cx-16, cy+28); ctx.stroke();
    ocirc(cx-16, cy-25, 4, '#ffd95e', '#9c6f12', 1.8);
    const bx = cx-13, by = cy-22, bw = 33, bh = 42;
    opoly([[bx,by],[bx+bw,by],[bx+bw,by+bh],[bx+bw/2,by+bh-12],[bx,by+bh]], it.color, it.ink, 3);
    ctx.save(); ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx+bw/2,by+bh-12); ctx.lineTo(bx,by+bh); ctx.closePath(); ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.20)'; ctx.fillRect(bx, by, bw*0.36, bh);
    ctx.fillStyle = 'rgba(0,0,0,0.14)'; ctx.fillRect(bx+bw*0.72, by, bw*0.3, bh); ctx.restore();
    star(bx+bw/2, by+bh*0.42, 7, '#fff', it.ink);
  } else {
    // real Tiny Swords grass tiles (the in-game terrain), tinted by the biome wash
    ctx.save(); rr(cx-30, cy-22, 60, 50, 10); ctx.clip();
    for (let gx=0; gx<2; gx++) for (let gy=0; gy<2; gy++) tileDraw(1, 1, cx-30 + gx*30, cy-22 + gy*30, 31);
    drawTree(cx+13, cy+10, 0.55, 3); drawTree(cx-14, cy+14, 0.42, 7);
    if (it.wash){ ctx.fillStyle = it.wash; ctx.fillRect(cx-30, cy-22, 60, 50); }
    ctx.restore();
    orr(cx-30, cy-22, 60, 50, 10, null, '#4f9638', 2.5);
  }
}
function drawChip(it, x, y, w, h){
  const owned = it.cost===0 || META.s.owned.includes(it.id);
  const equipped = META.s.equip[it.slot] === it.id;
  const tier = it.cost===0 ? 0 : (it.cost<=80 ? 1 : it.cost<=140 ? 2 : 3);
  const tint = ['#9fb3c8','#7fc4ff','#c9a2e8','#ffce5a'][tier];
  const frame = equipped ? '#ffd95e' : owned ? '#7ed05f' : tint;
  ctx.save(); ctx.shadowColor = frame; ctx.shadowBlur = (!owned && tier>=3) ? 13 : (equipped ? 9 : 4);
  gradPanel(x, y, w, h, 12, 'rgba(50,62,100,0.97)', 'rgba(26,32,54,0.97)', frame, (equipped||tier>=3) ? 3.5 : 2.5);
  ctx.restore();
  // dark art slot with rarity-tinted edge
  const sx = x+8, sy = y+8, sw = w-16, sh = h-38;
  orr(sx, sy, sw, sh, 8, 'rgba(18,24,40,0.8)', hexA(tint, equipped?1:0.85), equipped?3:2);
  ctx.save(); rr(sx, sy, sw, sh, 8); ctx.clip();
  const sg = ctx.createLinearGradient(0, sy, 0, sy+sh); sg.addColorStop(0, hexA(tint,0.30)); sg.addColorStop(1, 'rgba(0,0,0,0.22)');
  ctx.fillStyle = sg; ctx.fillRect(sx, sy, sw, sh);
  chipPreview(it, x+w/2, sy+sh/2);
  ctx.restore();
  if (!owned && tier>=2) cardShine(sx, sy, sw, sh, 8, it.id.length*0.3);
  if (tier>=3) ocirc(x+w-13, y+13, 7, tint, '#1c2030', 2);
  chunkyText(it.name, x+w/2, y+h-19, 9.5, '#fff', '#10131f', '700');
  if (equipped) chunkyText('✓ EQUIPPED', x+w/2, y+h-7, 8, '#ffd95e', null, '700');
  else if (owned) chunkyText('TAP TO USE', x+w/2, y+h-7, 8, '#7ee860', null, '700');
  else { gemIcon(x+w/2-14, y+h-7, 5); chunkyText(it.cost, x+w/2+2, y+h-7, 10, '#9fe8ff', null, '700', 'left'); }
  hit(x, y, w, h, ()=>buyItem(it));
}
// distinct icon per keep-upgrade so the Upgrades tab reads at a glance
function modGlyph(id, cx, cy){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  if (id==='treasury'){ gemIcon(cx, cy, 9); }
  else if (id==='coffers'){ for (let k=0;k<3;k++) ocirc(cx-5+k*5, cy+4-k*4, 6, '#ffd95e', '#9c6f12', 2); }
  else if (id==='gate' || id==='bulwark'){
    orr(cx-9, cy-8, 18, 16, 3, '#cfd6e2', '#5a6478', 2.4);
    ctx.strokeStyle='#5a6478'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(cx-9,cy-1); ctx.lineTo(cx+9,cy-1); ctx.moveTo(cx-2,cy-8); ctx.lineTo(cx-2,cy-1); ctx.moveTo(cx-6,cy-1); ctx.lineTo(cx-6,cy+7); ctx.moveTo(cx+4,cy-1); ctx.lineTo(cx+4,cy+7); ctx.stroke();
  }
  else if (id==='fletcher'){ ctx.strokeStyle='#7a4a1a'; ctx.lineWidth=2.6; ctx.beginPath(); ctx.moveTo(cx-8,cy+7); ctx.lineTo(cx+7,cy-7); ctx.stroke(); opoly([[cx+9,cy-9],[cx+1,cy-7],[cx+7,cy-1]], '#7a4a1a', null); }
  else if (id==='quarter'){ orr(cx-8,cy-8,16,16,3,'#fff','#5a6478',2.2); ctx.fillStyle='#5a6478'; for (const d of [[-3.5,-3.5],[3.5,3.5],[3.5,-3.5],[-3.5,3.5],[0,0]]){ ctx.beginPath(); ctx.arc(cx+d[0],cy+d[1],1.4,0,7); ctx.fill(); } }
  else if (id==='squire'){ ctx.fillStyle='#cfd6e2'; ctx.beginPath(); ctx.arc(cx,cy,8,Math.PI,0); ctx.lineTo(cx+8,cy+4); ctx.lineTo(cx-8,cy+4); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#5a6478'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#5a6478'; rr(cx-2,cy-7,4,11,1.5); ctx.fill(); }
  else if (id==='warhorn'){ ctx.fillStyle='#f0e2c2'; ctx.beginPath(); ctx.moveTo(cx-8,cy+5); ctx.quadraticCurveTo(cx+9,cy+7,cx+9,cy-6); ctx.quadraticCurveTo(cx+2,cy-1,cx-8,cy-1); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#9c6f12'; ctx.lineWidth=1.8; ctx.stroke(); }
  else { ctx.strokeStyle='#9c6f12'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(cx-6,cy+4); ctx.lineTo(cx,cy-5); ctx.lineTo(cx+6,cy+4); ctx.stroke(); }
  ctx.restore();
}
function drawStoreRow(it, yy, owned, ownLabel){
  const afford = META.s.gems >= it.cost;
  const accent = owned ? '#7ed05f' : it.slot==='prestige' ? '#c9a2e8' : '#5cb0f0';
  const h = 64;
  ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = owned?5:11;
  gradPanel(12, yy, W-24, h, 14, 'rgba(54,66,108,0.98)', 'rgba(28,34,58,0.98)', accent, 3.5);
  ctx.restore();
  if (!owned && afford) cardShine(16, yy+4, W-32, h-8, 12, it.id.length*0.4);
  // big glowing medallion with real art
  const mx = 48, my = yy+h/2;
  ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = 8; ocirc(mx, my, 27, 'rgba(14,20,36,0.92)', accent, 3); ctx.restore();
  if (it.slot === 'prestige'){
    ctx.save(); ctx.beginPath(); ctx.arc(mx, my, 25, 0, 7); ctx.clip(); drawDeco(it.id, mx, my+15, 0.95); ctx.restore();
  } else if (!realIcon(MOD_ICON[it.id], mx, my, 38)){   // real fantasy icon, fallback to glyph
    ctx.save(); ctx.translate(mx, my); ctx.scale(1.5, 1.5); modGlyph(it.id, 0, 0); ctx.restore();
  }
  chunkyText(it.name, 88, yy+22, 16, '#fff', '#10131f', '700', 'left');
  chunkyText(it.desc, 88, yy+43, 12, '#cfe0f5', null, '600', 'left');
  if (owned){ chunkyText('✓ '+ownLabel, W-66, my, 13, '#7ee860', '#14361a', '700'); }
  else {
    if (it.honor){ honorIcon(W-176, my, 6); chunkyText('+'+it.honor, W-166, my+1, 11, '#ffd95e', null, '700', 'left'); }
    chunkyBtn(W-122, my-19, 104, 38, afford?'#ffce5a':'#8a8a94', afford?'#dba32c':'#5e5e68', afford?'#9c6f12':'#3a3a44', 'BUY '+it.cost, 16);
    hit(W-122, my-19, 104, 38, ()=>buyItem(it));
  }
}
function drawGemTab(){
  let yy = 144;
  for (const pack of GEM_PACKS){
    const isFree = pack.id==='free', ready = isFree ? freeGemReady() : true;
    const h = 80, hot = (pack.id==='large' || pack.id==='starter');
    const frame = isFree ? '#7ed05f' : hot ? '#ffd95e' : pack.id==='med' ? '#c9a2e8' : '#5cb0f0';
    ctx.save(); ctx.shadowColor = frame; ctx.shadowBlur = hot ? 15 : 6;
    gradPanel(12, yy, W-24, h, 14, 'rgba(50,62,100,0.97)', 'rgba(26,32,54,0.97)', frame, hot ? 3.5 : 3);
    ctx.restore();
    if (hot) cardShine(20, yy+6, W-40, h-12, 8, pack.gems*0.001);
    // gem showcase slot
    ctx.save(); ctx.shadowColor='#2a8fc0'; ctx.shadowBlur=8; orr(24, yy+12, 64, h-24, 10, 'rgba(14,20,36,0.85)', '#3fb6e0', 2.5); ctx.restore();
    gemPile(56, yy+h/2, pack.gems);
    chunkyText(pack.gems + ' GEMS', 102, yy+28, 19, '#fff', '#10131f', '700', 'left');
    chunkyText(pack.name, 102, yy+49, 11, '#cfe0f5', null, '600', 'left');
    if (pack.best) chunkyText(pack.best, 102, yy+64, 9.5, '#ffd95e', null, '700', 'left');
    if (pack.id==='starter') uiRibbon(W-118, yy+8, 96, 'STARTER', 'yellow');
    else if (pack.id==='large') uiRibbon(W-118, yy+8, 96, 'BEST VALUE', 'yellow');
    else if (pack.id==='med') uiRibbon(W-110, yy+8, 88, 'POPULAR', 'blue');
    const ok = isFree ? ready : true, label = isFree ? (ready ? 'CLAIM' : 'SOON') : pack.price;
    spriteBtn(W-126, yy+h-44, 106, 36, ok?'blue':'red', label, 15);
    if (ok) hit(W-126, yy+h-44, 106, 36, ()=>buyGems(pack));
    yy += h+12;
  }
  chunkyText('Demo only — bundles grant gems instantly, no real payment', W/2, yy+6, 10, '#dfe6ff', null, '500');
}
function drawStore(){
  uiHits = []; menuBg(); menuHeader('ROYAL STORE');
  // tabs
  const tabW = 110;
  [['cos','COSMETICS',12],['mod','UPGRADES',126],['pre','PRESTIGE',240],['gem','GEMS',354]].forEach(([id,label,tx])=>{
    const on = storeTab===id;
    orr(tx, 100, tabW, 34, 10, on?'#ffd95e':'rgba(43,40,70,0.7)', on?'#a8761c':'rgba(255,255,255,0.3)', 2.5);
    chunkyText(label, tx+tabW/2, 118, 12, on?'#5a3a0a':'#fff', null, '600');
    hit(tx, 100, tabW, 34, ()=>{ storeTab=id; });
  });
  if (storeTab === 'cos'){
    let yy = 150;
    [['hero','Hero'],['tower','Towers'],['banner','Banners'],['terrain','Terrain']].forEach(([slot,label])=>{
      chunkyText(label, 18, yy, 15, '#fff', null, '600', 'left');
      SKIN_CAT[slot].forEach((it,i)=>{ drawChip(it, 12+i*92, yy+8, 88, 96); });
      yy += 128;
    });
  } else if (storeTab === 'mod'){
    chunkyText('Permanent upgrades — bought once, always active', W/2, 148, 11, '#dfe6ff', null, '500');
    let yy = 156;
    MOD_CAT.forEach(m=>{ drawStoreRow(m, yy, !!META.s.mods[m.id], 'ACTIVE'); yy += 72; });
  } else if (storeTab === 'gem'){
    drawGemTab();
  } else {
    chunkyText('Spend Gems to raise your Honor rank: '+honorRank(), W/2, 148, 11, '#ffd95e', null, '600');
    let yy = 168;
    PRESTIGE_CAT.forEach(p=>{ drawStoreRow(p, yy, META.s.owned.includes(p.id), 'OWNED'); yy += 80; });
  }
  drawMenuToast();
}
// themed vector badge icons
function badgeIcon(id, cx, cy){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const sword=(rot)=>{ ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); opoly([[-2,-11],[2,-11],[2.5,5],[0,8],[-2.5,5]],'#e2e9f2','#8a98ad',1.6); orr(-6,4.5,12,3,1.4,'#d2a64c','#7a5a18',1.4); orr(-1.4,7,2.8,6,1.2,'#9a6a3c','#5a3a1e',1.2); ctx.restore(); };
  const skull=()=>{ ocirc(cx,cy-2,9,'#eef1f5','#8a98ad',2); ctx.fillStyle='#2a3142'; ctx.beginPath(); ctx.arc(cx-3.5,cy-3,2.1,0,7); ctx.arc(cx+3.5,cy-3,2.1,0,7); ctx.fill(); orr(cx-5,cy+5,10,5,2,'#eef1f5','#8a98ad',1.5); ctx.strokeStyle='#8a98ad'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx-1.6,cy+5);ctx.lineTo(cx-1.6,cy+10);ctx.moveTo(cx+1.6,cy+5);ctx.lineTo(cx+1.6,cy+10);ctx.stroke(); };
  const crown=()=>{ opoly([[cx-11,cy+6],[cx-11,cy-7],[cx-4,cy-1],[cx,cy-10],[cx+4,cy-1],[cx+11,cy-7],[cx+11,cy+6]],'#ffd95e','#9c6f12',2); for(const dx of [-7,0,7]) ocirc(cx+dx,cy-8,1.9,'#ff5e6e','#9c2433',1); };
  if (id==='first_blood'){ sword(0); ctx.fillStyle='#e0414e'; ctx.beginPath(); ctx.arc(cx+7,cy+7,3,0,7); ctx.fill(); }
  else if (id==='centurion'){ sword(-0.5); sword(0.5); }
  else if (id==='slayer'){ skull(); }
  else if (id==='giantslayer'){ skull(); opoly([[cx-8,cy-9],[cx-4,cy-14],[cx,cy-9],[cx+4,cy-14],[cx+8,cy-9]],'#ffd95e','#9c6f12',1.6); }
  else if (id==='veteran'){ opoly([[cx-9,cy-9],[cx+9,cy-9],[cx+9,cy+1],[cx,cy+11],[cx-9,cy+1]],'#9fb6e0','#3b5ba8',2.2); star(cx,cy-1,4.5,'#fff','#3b5ba8'); }
  else if (id==='warlord'){ ctx.fillStyle='#cfd6e2'; ctx.beginPath(); ctx.arc(cx,cy,9,Math.PI,0); ctx.lineTo(cx+9,cy+5); ctx.lineTo(cx-9,cy+5); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#6a7488'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#ff5e4d'; rr(cx-1.5,cy-13,3,9,1.2); ctx.fill(); }
  else if (id==='legend'){ crown(); }
  else if (id==='flawless'){ ctx.fillStyle='#ff6e8a'; ctx.beginPath(); ctx.moveTo(cx,cy+8); ctx.bezierCurveTo(cx-12,cy-2,cx-5,cy-12,cx,cy-5); ctx.bezierCurveTo(cx+5,cy-12,cx+12,cy-2,cx,cy+8); ctx.fill(); ctx.strokeStyle='#c2415e'; ctx.lineWidth=1.6; ctx.stroke(); glint(cx-3,cy-4,1.8); }
  else if (id==='collector'){ gemIcon(cx,cy,11); }
  else { ocirc(cx-5,cy+4,7,'#e0b23c','#9c6f12',2); ocirc(cx+5,cy+4,7,'#e0b23c','#9c6f12',2); ocirc(cx,cy-3,8,'#ffe487','#9c6f12',2); chunkyText('$',cx,cy-2,8,'#9c6f12',null,'700'); }
  ctx.restore();
}

  let changed = false;
  for (const b of BADGES) if (META.s.badges[b.id] && !META.s.seenBadges[b.id]){ META.s.seenBadges[b.id]=true; changed=true; }

    const x=gx+(i%cols)*(cw+gap), y=gy+Math.floor(i/cols)*(ch+gap), have=!!META.s.badges[b.id];

    ctx.save(); ctx.shadowColor=fr; ctx.shadowBlur=have?8:0; ocirc(x+cw/2, y+34, 22, 'rgba(14,20,36,0.9)', fr, 2.6); ctx.restore();
    ctx.save(); if(!have){ ctx.globalAlpha=0.5; ctx.filter='grayscale(0.8) brightness(0.6)'; } if(!realIcon(BADGE_ICON[b.id], x+cw/2, y+34, 32)) badgeIcon(b.id, x+cw/2, y+34); ctx.filter='none'; ctx.globalAlpha=1; ctx.restore();
    if (have) star(x+cw-16, y+16, 6.5, '#ffd95e', '#a8761c');
    chunkyText(b.name, x+cw/2, y+64, 11, have?'#fff':'#aab4d0', '#10131f', '700');
    chunkyText(b.desc, x+cw/2, y+78, 8.5, have?'#dfe6ff':'#8a93b8', null, '500');
    honorIcon(x+cw/2-20, y+93, 5);
    chunkyText('+'+b.honor, x+cw/2-10, y+94, 9.5, '#ffd95e', null, '700', 'left');
  });
  drawMenuToast();
}
// hand-drawn vector gear icons (on-style with the chunky outline look)
function gearIcon(id, cx, cy){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  if (id==='sword'){
    opoly([[cx-2.5,cy-13],[cx+2.5,cy-13],[cx+3.5,cy+3],[cx,cy+8],[cx-3.5,cy+3]], '#e2e9f2', '#8a98ad', 2);
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(cx,cy-11); ctx.lineTo(cx,cy+3); ctx.stroke();
    orr(cx-8,cy+3,16,4,1.6,'#d2a64c','#7a5a18',1.8);
    orr(cx-1.8,cy+7,3.6,9,1.6,'#9a6a3c','#5a3a1e',1.6);
    ocirc(cx,cy+17,2.6,'#ffd95e','#9c6f12',1.6);
  } else if (id==='bow'){
    ctx.strokeStyle='#9a6a3c'; ctx.lineWidth=3.2; ctx.beginPath(); ctx.arc(cx+4,cy,13,Math.PI*0.62,Math.PI*1.38); ctx.stroke();
    ctx.strokeStyle='#e8e0cf'; ctx.lineWidth=1.3; ctx.beginPath(); ctx.moveTo(cx+4+Math.cos(Math.PI*0.62)*13, cy+Math.sin(Math.PI*0.62)*13); ctx.lineTo(cx+4+Math.cos(Math.PI*1.38)*13, cy+Math.sin(Math.PI*1.38)*13); ctx.stroke();
    ctx.strokeStyle='#7a4a1a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx-9,cy); ctx.lineTo(cx+10,cy); ctx.stroke();
    opoly([[cx+13,cy],[cx+7,cy-3.5],[cx+7,cy+3.5]], '#cfd6e2', '#8a98ad', 1.2);
  } else if (id==='plate'){
    opoly([[cx-10,cy-10],[cx+10,cy-10],[cx+10,cy+2],[cx,cy+12],[cx-10,cy+2]], '#b2bccc', '#6a7488', 2.5);
    opoly([[cx-10,cy-10],[cx,cy-10],[cx,cy+9],[cx-10,cy+1]], 'rgba(255,255,255,0.22)', null);
    ctx.strokeStyle='#6a7488'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy+11); ctx.moveTo(cx-10,cy-2); ctx.lineTo(cx+10,cy-2); ctx.stroke();
  } else if (id==='drum'){
    orr(cx-10,cy-7,20,14,5,'#c0894a','#7a5320',2.4);
    ctx.fillStyle='#ead9b0'; ctx.beginPath(); ctx.ellipse(cx,cy-7,10,3.6,0,0,7); ctx.fill(); ctx.strokeStyle='#7a5320'; ctx.lineWidth=1.6; ctx.stroke();
    ctx.strokeStyle='#7a5320'; ctx.lineWidth=1.3; ctx.beginPath(); ctx.moveTo(cx-9,cy-3); ctx.lineTo(cx+9,cy+4); ctx.moveTo(cx+9,cy-3); ctx.lineTo(cx-9,cy+4); ctx.stroke();
  } else if (id==='coin'){
    ocirc(cx-4,cy+3,8,'#e0b23c','#9c6f12',2.2); ocirc(cx+4,cy-2,8.5,'#ffe487','#9c6f12',2.2);
    chunkyText('$', cx+4, cy-1, 9, '#9c6f12', null, '700');
  } else {
    opoly([[cx,cy-12],[cx+11,cy-3],[cx+7,cy+11],[cx-7,cy+11],[cx-11,cy-3]], '#7fa8ff', '#3b5ba8', 2.2);
    ctx.strokeStyle='#dfe9ff'; ctx.lineWidth=1.7; ctx.beginPath(); ctx.moveTo(cx,cy-6); ctx.lineTo(cx,cy+6); ctx.moveTo(cx-4.5,cy-1); ctx.lineTo(cx+4.5,cy+3); ctx.stroke();
    glint(cx-3,cy-4,1.8);
  }
  ctx.restore();
}
function drawGear(){
  uiHits = []; menuBg(); menuHeader('GEAR');
  chunkyText('Equip one item per slot — applies every run', W/2, 104, 11, '#dfe6ff', null, '500');
  let y = 124;
  for (const slot of GEAR_SLOTS){
    chunkyText(slot.toUpperCase(), 18, y, 13, '#ffd95e', '#5a3a0a', '700', 'left');
    GEAR.filter(g=>g.slot===slot).forEach((g,i)=>{
      const x = 12 + i*228, cw = 222, ch = 76;
      const owned = META.s.gear.owned.includes(g.id), eq = META.s.gear.equip[slot]===g.id;
      const fr = eq?'#ffd95e':owned?'#7ed05f':'#7fc4ff';
      ctx.save(); ctx.shadowColor=fr; ctx.shadowBlur=eq?10:5; gradPanel(x, y+8, cw, ch, 13, 'rgba(50,62,100,0.97)', 'rgba(26,32,54,0.97)', fr, eq?3.5:2.8); ctx.restore();
      const mx = x+34, my = y+8+34;
      ctx.save(); ctx.shadowColor=fr; ctx.shadowBlur=7; ocirc(mx, my, 23, 'rgba(14,20,36,0.92)', fr, 2.6); ctx.restore();
      if (!realIcon(GEAR_ICON[g.id], mx, my, 36)) gearIcon(g.id, mx, my);
      chunkyText(g.name, x+62, y+27, 13, '#fff', '#10131f', '700', 'left');
      chunkyText(g.desc, x+62, y+44, 10, '#cfe0f5', null, '600', 'left');
      if (eq){ chunkyText('✓ EQUIPPED', x+cw/2+18, y+8+ch-13, 11, '#ffd95e', null, '700'); }
      else if (owned){ chunkyBtn(x+60, y+8+ch-26, 96, 20, '#5cc04c', '#41973a', '#2e6326', 'EQUIP', 11); hit(x+60, y+8+ch-26, 96, 20, ()=>{ META.s.gear.equip[slot]=g.id; META.save(); sfx.place(); }); }
      else { chunkyBtn(x+60, y+8+ch-26, 96, 20, '#ffce5a', '#dba32c', '#9c6f12', g.cost+'◆', 11); hit(x+60, y+8+ch-26, 96, 20, ()=>{ if (spendGems(g.cost)){ META.s.gear.owned.push(g.id); META.s.gear.equip[slot]=g.id; META.save(); toast(g.name+' equipped!'); sfx.fanfare(); } else toast('Need '+g.cost+' gems'); }); }
    });
    y += 98;
  }
  drawMenuToast();
}
function drawHeroes(){
  uiHits = []; menuBg(); menuHeader('HEROES');
  chunkyBtn(W-104, 50, 92, 34, '#7fc4ff', '#3b80d2', '#2a5a9e', 'GEAR', 15);
  hit(W-104, 50, 92, 34, ()=>{ mode='gear'; });
  chunkyText('Choose your champion — each grants a run-long boon', W/2, 104, 11, '#dfe6ff', null, '500');
  let y = 124;
  for (const h of HEROES){
    const owned = META.s.heroes.owned.includes(h.id), sel = META.s.heroes.sel === h.id;
    const col = RARITY_COL[h.rarity] || '#9fb3c8';
    const HSPR = { commander:'warrior_b', markswoman:'archer_b', trader:'pawn_y', pyromancer:'warrior_r', frostweaver:'pawn_b' };
    ctx.save(); ctx.shadowColor = sel ? '#ffd95e' : col; ctx.shadowBlur = sel ? 12 : 7;
    gradPanel(14, y, W-28, 74, 14, sel ? 'rgba(74,64,30,0.55)' : 'rgba(50,62,100,0.96)', 'rgba(26,32,54,0.96)', sel ? '#ffd95e' : col, sel ? 3.5 : 3);
    ctx.restore();
    const mx = 54, my = y+37;
    ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = owned ? 8 : 3; ocirc(mx, my, 28, 'rgba(14,20,36,0.92)', owned ? col : '#5a6488', 3); ctx.restore();
    ctx.save(); ctx.beginPath(); ctx.arc(mx, my, 26, 0, 7); ctx.clip();
    const mg = ctx.createLinearGradient(0, my-26, 0, my+26); mg.addColorStop(0, hexA(col,0.32)); mg.addColorStop(1, 'rgba(0,0,0,0.22)'); ctx.fillStyle = mg; ctx.fillRect(mx-26, my-26, 52, 52);
    if (!owned){ ctx.globalAlpha = 0.5; ctx.filter = 'grayscale(0.7) brightness(0.55)'; }
    spr(HSPR[h.id] || 'warrior_b', 192, 192, Math.floor(time*6)%6, 0, mx, my+27, 0.46, false, 0.78);
    ctx.filter = 'none'; ctx.globalAlpha = 1; ctx.restore();
    if (!owned){ ocirc(mx+19, my+19, 9, 'rgba(16,18,28,0.92)', '#cfd6e2', 2); orr(mx+15.5, my+18.5, 7, 6, 1.6, '#cfd6e2', '#6a7488', 1.4); ctx.strokeStyle='#cfd6e2'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(mx+19, my+17.5, 2.6, Math.PI, 0); ctx.stroke(); }
    const lvl = heroLvl(h.id);
    chunkyText(h.name + (owned ? '   Lv' + lvl : ''), 88, y+22, 16, '#fff', '#10131f', '700', 'left');
    chunkyText(h.eff(owned ? lvl : 1), 88, y+44, 12, '#cfe0f5', null, '500', 'left');
    chunkyText(h.rarity.toUpperCase(), 88, y+62, 9, col, null, '600', 'left');
    const bx = W-122, bw = 104;
    if (owned){
      if (sel) chunkyText('SELECTED', bx+bw/2, y+18, 12, '#ffd95e', null, '700');
      else { chunkyBtn(bx, y+8, bw, 26, '#5cc04c', '#41973a', '#2e6326', 'SELECT', 13); hit(bx, y+8, bw, 26, ()=>{ META.s.heroes.sel = h.id; META.save(); sfx.place(); }); }
      const lc = heroLvlCost(h.id);
      chunkyBtn(bx, y+40, bw, 26, '#7fc4ff', '#3b80d2', '#234a7e', 'LVL UP '+lc+'◆', 12);
      hit(bx, y+40, bw, 26, ()=>{ if (spendGems(lc)){ META.s.heroes.lvl[h.id] = lvl+1; META.save(); toast(h.name+' Lv'+(lvl+1)+'!'); sfx.merge(); } else toast('Need '+lc+' gems'); });
    } else {
      chunkyBtn(bx, y+22, bw, 32, '#ffce5a', '#dba32c', '#9c6f12', h.cost+'◆', 15);
      hit(bx, y+22, bw, 32, ()=>{ if (spendGems(h.cost)){ META.s.heroes.owned.push(h.id); META.s.heroes.sel = h.id; META.s.heroes.lvl[h.id] = 1; META.save(); toast(h.name+' recruited!'); sfx.fanfare(); } else toast('Need '+h.cost+' gems'); });
    }
    y += 82;
  }
  // --- WAR PARTY: the mixed sortie squad, each member leveled individually ---
  chunkyText('WAR PARTY — your sortie squad', W/2, y+4, 12, '#ffd95e', '#3a2a12', '700'); y += 20;
  for (const m of PARTY){
    const lvl = partyLvl(m.id), cost = partyUpCost(m.id);
    orr(14, y, W-28, 46, 12, 'rgba(50,62,100,0.92)', 'rgba(255,255,255,0.15)', 2);
    if (m.spr) spr(m.spr, m.fw, m.fw, Math.floor(time*6)%m.fn, 0, 44, y+42, m.sc*0.72, false, m.ay);
    else spr(heroSprite(), 192, 192, Math.floor(time*6)%6, 0, 44, y+40, 0.4, false, 0.76);
    chunkyText(m.name + '  Lv' + lvl, 84, y+19, 14, '#fff', '#10131f', '700', 'left');
    chunkyText('melee dmg ' + Math.round(partyDmg(m.id)) + (m.id==='monk' ? '  · heals + mends wall' : m.id==='lancer' ? '  · reach' : '  · the champion'), 84, y+36, 10, '#cfe0f5', null, '600', 'left');
    const bx = W-122;
    chunkyBtn(bx, y+10, 106, 26, '#7fc4ff', '#3b80d2', '#234a7e', 'LVL UP ' + cost + '◆', 12);
    hit(bx, y+10, 106, 26, ()=>{ if (spendGems(cost)){ META.s.party[m.id] = lvl+1; META.save(); toast(m.name+' Lv'+(lvl+1)+'!'); sfx.merge(); } else toast('Need '+cost+' gems'); });
    y += 52;
  }
  drawMenuToast();
}
/* the Kingdom notebook — one consolidated overview of all meta progress */
function drawKingdom(){
  uiHits = []; menuBg(); menuHeader('KINGDOM');
  // --- city view panel ---
  const px = 14, py = 98, pw = W-28, ph = 188;
  orr(px, py, pw, ph, 14, 'rgba(30,40,70,0.5)', 'rgba(255,255,255,0.18)', 2.5);
  ctx.save(); rr(px, py, pw, ph, 14); ctx.clip();
  // real sky + floating island + castle (same art as the title hero shot)
  const skg = ctx.createLinearGradient(0, py, 0, py+ph);
  skg.addColorStop(0,'#5a8fd8'); skg.addColorStop(0.55,'#9fb6e2'); skg.addColorStop(1,'#e7c8de');
  ctx.fillStyle = skg; ctx.fillRect(px, py, pw, ph);
  for (let i=0;i<9;i++){ const sx=px+18+((i*97)%(pw-36)), sy=py+12+((i*53)%72); ctx.globalAlpha=0.45+0.4*Math.abs(Math.sin(time*1.4+i)); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,1.3,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.save();
  ctx.translate(W/2, py + ph*0.44 + Math.sin(time*1.2)*3); ctx.scale(0.64, 0.64);
  drawDreamIsland(0, 0);
  const SLOTS = { p_cathedral:[112,-16], p_statue:[-88,-4], p_fountain:[88,0], p_garden:[-130,8], p_throne:[42,12] };
  for (const id in SLOTS) if (META.s.owned.includes(id)){ const s = SLOTS[id]; drawDeco(id, s[0], s[1], 1.2); }
  drawChibiKnight(0, 16, 1.5);
  ctx.restore();
  ctx.restore();
  chunkyText('Your Keep', px+12, py+17, 12, '#fff', '#10131f', '700', 'left');
  chunkyText(honorRank(), W-px-12, py+17, 12, '#ffd95e', null, '600', 'right');
  // --- info rows ---
  const champ = HERO_BY_ID[META.s.heroes.sel] || HEROES[0];
  const modsOwned = MOD_CAT.filter(m=>META.s.mods[m.id]).length;
  const prestigeOwned = META.s.owned.filter(id=>CATALOG_BY_ID[id] && CATALOG_BY_ID[id].slot==='prestige').length;
  const badgesGot = BADGES.filter(b=>META.s.badges[b.id]).length;
  const rows = [
    ['Champion', champ.name + ' Lv' + heroLvl(champ.id) + ' — ' + champ.eff(heroLvl(champ.id))],
    ['City income', idleRate() + ' gems/hr  (cap ' + idleCapH() + 'h)'],
    ['Village', 'Granary Lv' + META.s.village.granary + '  ·  Warehouse Lv' + META.s.village.warehouse],
    ['Keep upgrades', modsOwned + ' / ' + MOD_CAT.length + ' active'],
    ['Decorations', prestigeOwned + ' / ' + PRESTIGE_CAT.length + ' built'],
    ['Badges', badgesGot + ' / ' + BADGES.length + ' earned'],
    ['Best wave', String(META.s.bestWave)],
    ['Runs · Kills', META.s.stats.runs + ' · ' + META.s.stats.kills],
  ];
  let y = 288;
  for (const row of rows){
    orr(14, y, W-28, 30, 8, 'rgba(255,255,255,0.08)', null);
    chunkyText(row[0], 26, y+16, 12, '#aab4d0', null, '600', 'left');
    chunkyText(row[1], W-26, y+16, 12, '#fff', null, '600', 'right');
    y += 35;
  }
  // --- village idle upgrades ---
  chunkyBtn(14, y+2, 222, 40, '#7ed05f', '#56a83c', '#2e6326', 'GRANARY  '+granaryCost()+'◆', 14);
  hit(14, y+2, 222, 40, ()=>buyVillage('granary'));
  chunkyBtn(244, y+2, 222, 40, '#5cb0f0', '#3b80d2', '#2a5a9e', 'WAREHOUSE  '+warehouseCost()+'◆', 13);
  hit(244, y+2, 222, 40, ()=>buyVillage('warehouse'));
  // --- links to detail screens ---
  const by = y + 52;
  chunkyBtn(W/2-168, by, 104, 44, '#ffce5a', '#dba32c', '#9c6f12', 'STORE', 17);  hit(W/2-168, by, 104, 44, ()=>{ mode='store'; storeTab='cos'; });
  chunkyBtn(W/2-50,  by, 100, 44, '#7fc4ff', '#3b80d2', '#2a5a9e', 'HEROES', 16); hit(W/2-50, by, 100, 44, ()=>{ mode='heroes'; });
  chunkyBtn(W/2+64,  by, 104, 44, '#c9a2e8', '#9a6fc4', '#5d3a8a', 'BADGES', 16); hit(W/2+64, by, 104, 44, ()=>{ mode='badges'; });
  drawMenuToast();
}
